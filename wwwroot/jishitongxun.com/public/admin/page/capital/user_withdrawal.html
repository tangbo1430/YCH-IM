<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>

<body>
    <div class="layuimini-container">
        <div class="layuimini-main">
            <fieldset class="table-search-fieldset">
                <legend>搜索信息</legend>
                <div style="margin: 10px 10px 10px 10px">
                    <form class="layui-form layui-form-pane" action="">
                        <div class="layui-form-item">
                            <!-- <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="wid" autocomplete="off" class="layui-input"
                                        placeholder="ID">
                                </div>
                            </div>-->

                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="order_sn" autocomplete="off" class="layui-input"
                                        placeholder="订单号">
                                </div>
                            </div> 
                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="uid" autocomplete="off" class="layui-input"
                                        placeholder="用户ID">
                                </div>
                            </div>

                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="nick_name" autocomplete="off" class="layui-input"
                                        placeholder="用户昵称">
                                </div>
                            </div>

                            <!--<div class=" layui-inline">-->
                            <!--        <div class="layui-input-inline">-->
                            <!--            <input type="text" name="alipay_name" autocomplete="off" class="layui-input"-->
                            <!--                placeholder="支付宝姓名">-->
                            <!--        </div>-->
                            <!--</div>-->
                            <!--<div class=" layui-inline">-->
                            <!--            <div class="layui-input-inline">-->
                            <!--                <input type="text" name="alipay_account" autocomplete="off"-->
                            <!--                    class="layui-input" placeholder="支付宝账号">-->
                            <!--        </div>-->
                            <!--</div>-->

                            <div class=" layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="money" autocomplete="off" class="layui-input"
                                        placeholder="提现金额">
                                </div>
                            </div>

                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <select name="status" lay-filter="aihao">
                                        <option value="">状态</option>
                                        <option value="1">待处理</option>
                                        <option value="2">已通过</option>
                                        <option value="3">已拒绝</option>
                                    </select>
                                </div>
                            </div>


                            <div class="layui-inline">
                            <button type="submit" class="layui-btn layui-btn-primary" lay-submit
                                lay-filter="data-search-btn"><i class="layui-icon"></i> 搜 索</button>
                            </div>
                        </div>
                    </form>
                </div>
            </fieldset>
            
            <table class="layui-hide" id="currentTableId" lay-filter="currentTableFilter" style="align: center;">
            </table>
        </div>
    </div>
    <script src="../../lib/layui-v2.5.7/layui.js" charset="utf-8"></script>
    <script src="../../common/common.js" charset="utf-8"></script>
    <script>
        layui.use(['form', 'table'], function () {
            var $ = layui.jquery,
                form = layui.form,
                table = layui.table;

            table.render({
                elem: '#currentTableId',
                url: WebHost + 'capital/user_withdrawal',
                where: {
                    "login_token": AdminLoginToken,
                }, //设定异步数据接口的额外参数
                method: "POST",
                toolbar: '#toolbar',
                defaultToolbar: ['filter', 'exports', 'print', {
                    title: '提示',
                    layEvent: 'LAYTABLE_TIPS',
                    icon: 'layui-icon-tips'
                }],
                totalRow: true,
                cols: [[
                    { field: 'wid', title: 'ID', totalRowText: '合计' },
                    { field: 'user_nick_name', title: '用户ID-昵称' },
                    { field: 'order_sn', title: '订单号' },
                    { field: 'money', title: '提现金额', totalRow: true, },
                    { field: 'general_money', title: '到账金额', totalRow: true, },
                    { field: 'service_money', title: '手续费' },
                    { field: 'address', title: '提现地址' },
                    { field: 'status', title: '状态', templet: '#status' },
                    { field: 'remarke', title: '备注' },
                    { field: 'update_time', title: '处理时间', templet: '#update_time' },
                    { field: 'add_time', title: '申请时间', templet: '#add_time' },
                    { title: '操作', minWidth: 150, toolbar: '#currentTableBar', align: "center" }
                ]],
                limits: [10, 15, 20, 25, 50, 100],
                limit: 15,
                page: true,
                skin: 'line',
                
            });

            // 监听搜索操作
            form.on('submit(data-search-btn)', function (data) {
                // var result = JSON.stringify(data.field);
                // layer.alert(result, {
                //     title: '最终的搜索信息'
                // });
                data.field.admin_login_token = AdminLoginToken
                //执行搜索重载
                table.reload('currentTableId', {
                    where: data.field,
                    page: {
                        curr: 1
                    }
                }, 'json');

                return false;
            });


            table.on('tool(currentTableFilter)', function (obj) {
                var data = obj.data;
                if (obj.event === 'edit_info') {
                    Id = data.wid;
                    var index = layer.open({
                        title: '编辑提现申请',
                        type: 2,
                        shade: 0.2,
                        maxmin: true,
                        shadeClose: true,
                        area: ['80%', '80%'],
                        content: '../capital/user_withdrawal_edit.html',
                    });
                    $(window).on("resize", function () {
                        layer.full(index);
                    });
                    return false;

                }
            });
        });
    </script>

    <script type="text/html" id="status">
    {{#  if(d.status == "1"){ }}
       <span style="color:red">待处理</span>
    {{# }else if(d.status=="2"){}}
        <span style="color:green">已通过</span>
    {{# }else if(d.status=="3"){}}
        <span style="color:red">已拒绝</span>
    {{#  } }}
</script>

    <script type="text/html" id="deal_time">
        {{dateFormat(d.deal_time) }}
    </script>
    <script type="text/html" id="update_time">
            {{dateFormat(d.update_time) }}
        </script>
    <script type="text/html" id="add_time">
    {{dateFormat(d.add_time) }}
</script>
    <script type="text/html" id="pay_time">
    {{dateFormat(d.pay_time) }}
</script>

    <script type="text/html" id="currentTableBar">
    <a class="layui-btn layui-btn-xs data-count-edit" lay-event="edit_info">编辑</a>
</script>
</body>

</html>
