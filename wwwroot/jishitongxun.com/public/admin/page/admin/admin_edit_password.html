<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>

<body>
    <div class="layuimini-container">
        <div class="layuimini-main">



            <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
                <legend>修改密码</legend>
            </fieldset>

            <form class="layui-form" action="" lay-filter="MyForm">
                <input type="hidden" name="aid" value="" class="layui-input layui-disabled">
                <div class="layui-form-item">
                    <label class="layui-form-label ">用户名</label>
                    <div class="layui-input-inline">
                        <input type="text" name="user_name" class="layui-input layui-disabled">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label required">手机号</label>
                    <div class="layui-input-block">
                        <input type="text" name="phone" 
                            placeholder="请输入手机号" value="" class="layui-input">
                    </div>
                </div>


                <div class="layui-form-item">
                    <label class="layui-form-label required">原始密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="old_password" lay-verify="required" lay-reqtext="旧的密码不能为空"
                            placeholder="请输入旧的密码" value="" class="layui-input">
                        <tip>填写自己账号的旧的密码。</tip>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label required">新的密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="new_password" lay-verify="required" lay-reqtext="新的密码不能为空"
                            placeholder="请输入新的密码" value="" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label required">重复新的密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="re_password" lay-verify="required" lay-reqtext="重复密码需与西密码保持一致"
                            placeholder="请输入新的密码" value="" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
    <script src="../../common/common.js" charset="utf-8"></script>
    <!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->

    <script>
        layui.use(['form', 'table'], function () {
            var form = layui.form,
                layer = layui.layer,
                table = layui.table,
                $ = layui.$;

            /**
             * 初始化表单，要加上，不然刷新部分组件可能会不加载
             */
            form.render();
            // 当前弹出层，防止ID被覆盖
            var parentIndex = layer.index;


            //监听提交
            form.on('submit(saveBtn)', function (data) {
                data.field.login_token = AdminLoginToken
                $.post(WebHost + "admin/edit_admin_password", data.field,
                    function (data, textStatus, jqXHR) {
                        if (data.code == 200) {
                            parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                        }
                        layer.msg(data.msg, { time: 1000 }, function () {

                        });

                    },
                    "json"
                );

                // var index = layer.alert(JSON.stringify(data.field), {
                //     title: '最终的提交信息'
                // }, function () {
                //     // 关闭弹出层
                //     layer.close(index);
                //     layer.close(parentIndex);
                // });
                return false;

            });

            $.post(WebHost + "admin/get_admin_info", {
                "login_token": AdminLoginToken,
                "aid": parent.Id,
            }, function (data) {
                if (data.code == 201) {
                    layer.msg(data.msg, { time: 1000 }, function () {
                    });
                } else {
                    form.val('MyForm', data.data)
                }
            }, "json");


            //  $("#hid").find("option[value='{$param.hid}']").prop("selected",true);
            //   form.render();

        });
    </script>
</body>

</html>
