<!DOCTYPE html><html><head><meta charset="utf-8"><title>IM 异常中心</title><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css"><link rel="stylesheet" href="../../css/public.css"><style>.status{padding:2px 7px;border-radius:3px;font-size:12px}.pending{background:#ebf8ff;color:#2b6cb0}.processing{background:#faf5ff;color:#6b46c1}.failed{background:#fffaf0;color:#b7791f}.dead{background:#fff5f5;color:#c53030}.hint{color:#69727d;margin:0 0 12px}.trace{font-family:monospace;font-size:12px}.layui-tab-content{padding:10px 0}@media(max-width:768px){.hide-mobile{display:none}}</style></head><body><div class="layuimini-container"><div class="layuimini-main"><p class="hint">失败事件可单条重新处理，所有处置均记录管理员审计。</p><div class="layui-tab" lay-filter="anomalyTabs"><ul class="layui-tab-title"><li class="layui-this" data-type="">全部异常</li><li data-type="pending">待处理</li><li data-type="processing">处理超时</li><li data-type="failed">重试中</li><li data-type="dead">死信</li><li data-type="logs">操作审计</li></ul><div class="layui-tab-content"><div class="layui-tab-item layui-show"><table id="anomalyTable" lay-filter="anomalyTable"></table></div></div></div></div></div>
<script type="text/html" id="statusTpl"><span class="status {{d.queue_status}}">{{d.queue_status}}</span></script><script type="text/html" id="actions">{{# if(d.queue_status==='failed'||d.queue_status==='dead'||d.queue_status==='processing'){ }}<button class="layui-btn layui-btn-xs layui-btn-warm" lay-event="retry">重新处理</button>{{# } }}</script>
<script src="../../lib/layui-v2.5.5/layui.js"></script><script src="../../common/common.js"></script><script>layui.use(['table','element','layer'],function(){var table=layui.table,element=layui.element,layer=layui.layer,$=layui.jquery,api=location.protocol+'//'+location.host+'/index.php?s=/imcallback/admin/';function render(type){if(type==='logs'){table.render({elem:'#anomalyTable',url:api+'actionLogs',method:'post',where:{login_token:AdminLoginToken},page:true,cols:[[{field:'id',title:'ID',width:70},{field:'user_name',title:'管理员',width:110},{field:'event_id',title:'事件ID',width:90},{field:'action',title:'操作',width:120},{field:'before_status',title:'操作前',width:130},{field:'after_status',title:'操作后',width:130},{field:'result',title:'结果',width:90},{field:'error_message',title:'说明',minWidth:180},{field:'trace_id',title:'TraceID',minWidth:230},{field:'created_at',title:'时间',width:170,templet:function(d){return dateFormat(d.created_at)}}]]});return}table.render({elem:'#anomalyTable',id:'anomalyTable',url:api+'anomalies',method:'post',where:{login_token:AdminLoginToken,type:type},page:true,cols:[[{field:'id',title:'ID',width:70},{field:'event_name',title:'事件',minWidth:150},{field:'queue_status',title:'状态',width:90,templet:'#statusTpl'},{field:'retry_count',title:'自动重试',width:90},{field:'manual_retry_count',title:'人工重试',width:90},{field:'wait_seconds',title:'等待秒数',width:95},{field:'next_retry_at',title:'下次重试',width:170,templet:function(d){return dateFormat(d.next_retry_at)}},{field:'error_message',title:'失败原因',minWidth:200},{field:'trace_id',title:'TraceID',minWidth:220,cssClass:'trace'},{title:'操作',toolbar:'#actions',width:100,fixed:'right'}]]})}render('');element.on('tab(anomalyTabs)',function(){render(this.getAttribute('data-type'))});table.on('tool(anomalyTable)',function(obj){if(obj.event!=='retry')return;layer.confirm('确认重新处理事件 #'+obj.data.id+'？',{title:'人工重试'},function(i){$.post(api+'retry',{id:obj.data.id,login_token:AdminLoginToken},function(res){layer.close(i);layer.msg(res.msg);if(res.code===0)table.reload('anomalyTable')},'json')})})});</script></body></html>
