<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>IM 运行概览</title><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css"><link rel="stylesheet" href="../../css/public.css">
<style>
body{background:#f4f6f8}.layuimini-main{margin:0}.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.range .layui-btn{border-radius:4px}.health{padding:14px 16px;border-left:4px solid #2f855a;background:#fff;margin-bottom:14px}.health.warning{border-color:#d69e2e}.health.critical{border-color:#c53030}.health-title{font-size:16px;font-weight:600}.health-meta{color:#68707a;margin-top:5px}.metric{border:1px solid #e5e9ee;background:#fff;border-radius:6px;padding:14px;min-height:76px}.metric-label{color:#69727d;font-size:13px}.metric-value{font-size:25px;line-height:38px;font-weight:600;color:#20262d}.metric-sub{font-size:12px;color:#89919a}.chart-band{background:#fff;border-top:1px solid #e4e8ed;margin-top:14px;padding:16px}.chart-title{font-size:15px;font-weight:600;margin-bottom:8px}.chart{height:300px}.service-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:12px}.service{padding:10px 12px;background:#f7f8fa;border:1px solid #e5e8ec;border-radius:4px}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#38a169;margin-right:7px}.dot.warn{background:#d69e2e}.dot.bad{background:#c53030}@media(max-width:768px){.toolbar{align-items:flex-start;gap:10px;flex-direction:column}.service-grid{grid-template-columns:1fr}.chart{height:240px}.metric-value{font-size:21px}}
</style></head><body><div class="layuimini-container"><div class="layuimini-main">
<div class="toolbar"><div><strong style="font-size:18px">IM 回调运行概览</strong><div style="color:#7a828b;margin-top:4px" id="updated">-</div></div><div class="range"><button class="layui-btn layui-btn-sm" data-days="1">24小时</button><button class="layui-btn layui-btn-sm layui-btn-primary" data-days="7">7天</button><button class="layui-btn layui-btn-sm layui-btn-primary" data-days="30">30天</button></div></div>
<div id="health" class="health"><div class="health-title" id="healthTitle">正在读取运行状态</div><div class="health-meta" id="healthMeta">-</div><div class="service-grid" id="services"></div></div>
<div class="layui-row layui-col-space12" id="metrics"></div>
<div class="layui-row layui-col-space14"><div class="layui-col-md8 layui-col-xs12"><div class="chart-band"><div class="chart-title">回调处理趋势</div><div id="trend" class="chart"></div></div></div><div class="layui-col-md4 layui-col-xs12"><div class="chart-band"><div class="chart-title">事件类别分布</div><div id="category" class="chart"></div></div></div></div>
</div></div><script src="../../lib/layui-v2.5.5/layui.js"></script><script src="../../js/lay-config.js"></script><script src="../../common/common.js"></script>
<script>
layui.use(['jquery','echarts'],function(){var $=layui.jquery,echarts=layui.echarts,days=1;var api=location.protocol+'//'+location.host+'/index.php?s=/imcallback/admin/';var trend=echarts.init(document.getElementById('trend')),category=echarts.init(document.getElementById('category'));
var categoryNames={message:'消息',group:'群组',relation:'关系',profile:'资料',state:'在线状态',unknown:'未识别'};
function metric(label,value,sub){return '<div class="layui-col-lg2 layui-col-md4 layui-col-xs6"><div class="metric"><div class="metric-label">'+label+'</div><div class="metric-value">'+value+'</div><div class="metric-sub">'+sub+'</div></div></div>'}
function load(){ $.post(api+'overview',{login_token:AdminLoginToken,days:days},function(res){if(res.code!==0)return;var d=res.data,m=d.metrics,h=d.health;$('#updated').text('更新于 '+dateFormat(d.generated_at)+'，每60秒自动刷新');$('#metrics').html(metric('回调接收量',m.total,'当前时间范围')+metric('回调处理成功率',m.success_rate+'%','含正常忽略事件')+metric('失败 / 死信',m.failed+' / '+m.dead,'需要关注')+metric('待处理积压',m.pending,'全量实时值')+metric('重复推送',m.duplicates,'腾讯重复投递')+metric('事前回调 P95',m.before_p95_ms+' ms','同步链路耗时'));
var title={healthy:'运行正常',warning:'降级运行',critical:'存在严重异常'}[h.level];$('#health').attr('class','health '+h.level);$('#healthTitle').text(title);$('#healthMeta').text(h.reasons.length?h.reasons.join('；'):'回调入口、异步处理和数据投影均正常');var worker=h.worker_age_seconds<999999?h.worker_age_seconds+' 秒前':'无心跳';$('#services').html('<div class="service"><span class="dot '+(h.worker_age_seconds>30?'bad':'')+'"></span>Worker 心跳：'+worker+'</div><div class="service"><span class="dot '+(h.redis.available?'':'warn')+'"></span>Redis：'+(h.redis.available?'可用，队列 '+h.redis.queue_length:'不可用，数据库补偿')+'</div><div class="service"><span class="dot '+(h.oldest_pending_seconds>300?'bad':h.oldest_pending_seconds>60?'warn':'')+'"></span>最老待处理：'+h.oldest_pending_seconds+' 秒</div>');
trend.setOption({tooltip:{trigger:'axis'},legend:{data:['接收','成功','失败','重复']},grid:{left:45,right:18,top:40,bottom:35},xAxis:{type:'category',data:d.trend.map(function(x){return x.bucket})},yAxis:{type:'value',minInterval:1},series:[['接收','received','#2b6cb0'],['成功','success','#2f855a'],['失败','failed','#c53030'],['重复','duplicates','#805ad5']].map(function(s){return{name:s[0],type:'line',smooth:true,symbolSize:5,data:d.trend.map(function(x){return Number(x[s[1]])}),itemStyle:{color:s[2]}}})});category.setOption({tooltip:{trigger:'item'},legend:{bottom:0},series:[{type:'pie',radius:['42%','68%'],center:['50%','44%'],label:{formatter:'{b}\n{c}'},data:d.categories.map(function(x){return{name:categoryNames[x.event_category]||x.event_category,value:Number(x.total)}})}]});},'json')}
$('.range button').on('click',function(){$('.range button').addClass('layui-btn-primary');$(this).removeClass('layui-btn-primary');days=Number($(this).data('days'));load()});load();setInterval(load,60000);window.onresize=function(){trend.resize();category.resize()};});
</script></body></html>
