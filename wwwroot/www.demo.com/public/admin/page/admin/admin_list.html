<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title></title>
	<meta name="renderer" content="webkit" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
	<link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all" />
	<link rel="stylesheet" href="../../css/public.css" media="all" />
</head>

<body>
	<div class="layuimini-container">
		<div class="layuimini-main">
			<fieldset class="table-search-fieldset">
				<legend>搜索信息</legend>
				<div style="margin: 10px 10px 10px 10px">
					<form class="layui-form layui-form-pane" action="">
						<div class="layui-form-item">
							<div class="layui-inline">
								<div class="layui-input-inline">
									<input type="text" name="user_name" autocomplete="off" class="layui-input"
										placeholder="用户名" />
								</div>
							</div>

							<div class="layui-inline">
								<button type="submit" class="layui-btn layui-btn-primary" lay-submit
									lay-filter="data-search-btn">
									<i class="layui-icon"></i> 搜 索
								</button>
							</div>
						</div>
					</form>
				</div>
			</fieldset>

			<script type="text/html" id="toolbar_add">
<div class="layui-btn-container">
<button
class="layui-btn layui-btn-normal layui-btn-sm data-add-btn"
lay-event="add"
>
添 加
</button>
</div>
</script>

			<table class="layui-hide" id="currentTableId" lay-filter="currentTableFilter" style="align: center"></table>
		</div>
	</div>
	<script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
	<script src="../../common/common.js" charset="utf-8"></script>
	<script>
		layui.use(['form', 'table'], function () {
			var $ = layui.jquery,
				form = layui.form,
				table = layui.table

			table.render({
				elem: '#currentTableId',
				url: WebHost + 'Admin/get_admin_list',
				where: {
					login_token: AdminLoginToken,
				}, //设定异步数据接口的额外参数
				method: 'POST',
				toolbar: '#toolbar_add',
				// toolbar: '#toolbar',
				defaultToolbar: [
					'filter',
					'exports',
					'print',
					{
						title: '提示',
						layEvent: 'LAYTABLE_TIPS',
						icon: 'layui-icon-tips',
					},
				],
				cols: [[
					{ field: 'aid', title: 'ID' },
					{ field: 'user_name', title: '用户名' },
					{ field: 'add_time', title: '注册时间', templet: '#add_time_Tpl' },
					{ title: '操作', minWidth: 150, toolbar: '#currentTableBar', align: "center" }
				],
				],
				limits: [10, 15, 20, 25, 50, 100],
				limit: 15,
				page: true,
				skin: 'line',
			})

			// 监听搜索操作
			form.on('submit(data-search-btn)', function (data) {
				// var result = JSON.stringify(data.field);
				// layer.alert(result, {
				//     title: '最终的搜索信息'
				// });
				data.field.admin_login_token = AdminLoginToken
				//执行搜索重载
				table.reload(
					'currentTableId',
					{
						where: data.field,
						page: {
							curr: 1,
						},
					},
					'json'
				)

				return false
			})

			table.on('toolbar(currentTableFilter)', function (obj) {
				if (obj.event === 'add') {
					// 监听添加操作
					var index = layer.open({
						title: '添加',
						type: 2,
						shade: 0.2,
						maxmin: true,
						shadeClose: true,
						area: ['80%', '80%'],
						content: '../admin/admin_add.html',
					})
					$(window).on('resize', function () {
						layer.full(index)
					})
				}
			})

			table.on('tool(currentTableFilter)', function (obj) {
				var data = obj.data
				if (obj.event === 'edit_admin_password') {
					Id = data.aid
					var index = layer.open({
						title: '修改密码',
						type: 2,
						shade: 0.2,
						maxmin: true,
						shadeClose: true,
						area: ['80%', '80%'],
						content: '../admin/admin_edit_password.html',
					})
					$(window).on('resize', function () {
						layer.full(index)
					})
					return false
				} else if (obj.event === 'del_admin') {
					Id = data.aid
					admin_login_token = AdminLoginToken
					layer.confirm(
						'确认要删除吗',
						{ title: '删除确认' },
						function (index) {
							$.post(
								WebHost + 'admin/delete_admin',
								{ aid: Id, login_token: admin_login_token },
								function (data) {
									layer.msg(data.msg)
									if (data.code == 200) {
										location.reload()
									}
									layer.close(index)
								},
								'json'
							)
						}
					)
				} else if (obj.event === 'edit_admin_auth') {
					Id = data.aid
					var index = layer.open({
						title: '修改权限',
						type: 2,
						shade: 0.2,
						maxmin: true,
						shadeClose: true,
						area: ['80%', '80%'],
						content: '../admin/admin_edit_auth.html',
					})
					$(window).on('resize', function () {
						layer.full(index)
					})
					return false
				}else if (obj.event === 'clear_admin_token') {
					Id = data.aid
					admin_login_token = AdminLoginToken
					layer.confirm(
						'确认要清除token吗',
						{ title: '清除确认' },
						function (index) {
							$.post(
								WebHost + 'admin/clear_admin_token',
								{ aid: Id, login_token: admin_login_token },
								function (data) {
									layer.msg(data.msg)
									if (data.code == 200) {
										location.reload()
									}
									layer.close(index)
								},
								'json'
							)
						}
					)
				} 
			})
		})
	</script>



	<script type="text/html" id="add_time_Tpl">
{{dateFormat(d.add_time) }}
</script>
	<script type="text/html" id="currentTableBar">
<a
class="layui-btn layui-btn-xs data-count-edit"
lay-event="edit_admin_password"
>修改密码</a
>
 {{#  if(d.aid != "1"){ }}
       <a
class="layui-btn layui-btn-xs data-count-edit"
lay-event="edit_admin_auth"
>修改权限</a
>
   <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del_admin"
>删除</a
> 
    {{#  } }}
{{#  if(d.aid != "1" && localStorage.getItem("aid") == 1){ }}
<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="clear_admin_token">清除token</a>
{{#  } }}

</script>
</body>

</html>
