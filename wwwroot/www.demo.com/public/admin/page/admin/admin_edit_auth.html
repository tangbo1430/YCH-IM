    <script>
        var tree_obj = {
            tree_id: 'TreeObjId',
            tree_elem: '#auth_div',
            init: function (data) {
                var that = this;
                // $.ajax({
                //     url : url,
                //     type : 'get',
                //     dataType: 'json',
                //     async: false,
                //     success: function (res) {
                //         var data = res.data;
                //         that.render(data);
                //     }
                // })
                that.render(data);
            },
            render: function (data) {
                var that = this;
                var tree_id = that.tree_id;
                var elem = that.tree_elem;
                layui.tree.render({
                    elem: elem,
                    data: data,
                    showCheckbox: true,  //是否显示复选框,
                    id: tree_id,
                    isJump: false, //是否允许点击节点时弹出新窗口跳转,
                    click: function(obj){
                        // var data = obj.data;  //获取当前点击的节点数据
                        // layer.msg('状态：'+ obj.state + '<br>节点数据：' + JSON.stringify(data));
                        // that.getChecked(tree);
                    }
                })
            },
            get_checked: function(){
                var that = this;
                var tree_id = that.tree_id;
                var checked_data = layui.tree.getChecked(tree_id); //获取选中节点的数据
                var id_arr = [];
                that.get_checked_value(checked_data, id_arr);
                return id_arr;
                // console.log(checked_data);
                // layer.alert(JSON.stringify(checkedData), {shade:0});
            },
            get_checked_value: function (data, id_arr) {
                var that = this;
                layui.$.each(data,function (k, v) {
                    id_arr.push(v.id);
                    if (v.children !== undefined && v.children.length > 0) {
                        var children = v.children;
                        that.get_checked_value(children, id_arr);
                    }
                })
                return id_arr;
            }
        }


    </script>
