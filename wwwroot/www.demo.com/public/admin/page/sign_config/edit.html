<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>

<body>
<div class="layuimini-container">
    <div class="layuimini-main">
        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
            <legend>修改签到配置</legend>
        </fieldset>
        <form class="layui-form" action="" lay-filter="MyForm">

            <div class="layui-form-item">
                <label class="layui-form-label ">签到天数</label>
                <div class="layui-input-inline">
                    <input type="text" name="day_num" value="" lay-verify="required"
                           class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label ">奖励金币</label>
                <div class="layui-input-inline">
                    <input type="text" name="integral" value="0"
                           class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <input type="hidden" name="id">
                    <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>
                </div>
            </div>

        </form>
    </div>
</div>

<script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<script src="../../common/common.js" charset="utf-8"></script>
<!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->

<script>
    layui.use(['form', 'colorpicker', 'table'], function () {
        var form = layui.form,
            layer = layui.layer,
            table = layui.table,
            colorpicker = layui.colorpicker,
            $ = layui.$;
        /**
         * 初始化表单，要加上，不然刷新部分组件可能会不加载
         */
        //表单赋值
        colorpicker.render({
            elem: '#test-form'
            ,color: '#1c97f5'
            ,done: function(color){
                $('#test-form-input').val(color);
            }
        });
        form.render();
        // 当前弹出层，防止ID被覆盖
        var parentIndex = layer.index;
        var roomInfo;

        //监听提交
        form.on('submit(saveBtn)', function (data) {
            data.field.login_token = AdminLoginToken
            $.post(WebHost + "sign_config/edit", data.field,
                function (data, textStatus, jqXHR) {
                    if (data.code == 200) {
                        parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                    }
                    layer.msg(data.msg, { time: 1000 }, function () {

                    });

                },
                "json"
            );
            return false;
        });
        $.post(WebHost + "sign_config/get_info", {
            "login_token": AdminLoginToken,
            "id": parent.Id,
        }, function (data) {
            if (data.code == 201) {
                layer.msg(data.msg, { time: 1000 }, function () {
                });
            } else {
                Info = data.data;

                form.val('MyForm', Info)
                form.render();
            }
        }, "json");
    });
</script>
</body>

</html>
