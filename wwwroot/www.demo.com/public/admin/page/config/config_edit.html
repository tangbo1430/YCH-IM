<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>

<body>
    <div class="layuimini-container">
        <div class="layuimini-main">
            <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
                <legend>配置添加</legend>
            </fieldset>
            <form class="layui-form" action="" lay-filter="MyForm">
                <input type="hidden" name="cid" value=""  class="layui-input layui-disabled">
                <div class="layui-form-item">
                    <label class="layui-form-label ">配置标题</label>
                    <div class="layui-input-inline">
                        <input type="text" name="key_name" value="" lay-verify="required" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label ">配置名称</label>
                    <div class="layui-input-inline">
                        <input type="text" name="key_title" value="" lay-verify="required" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label ">配置参数</label>
                    <div class="layui-input-inline">
                        <textarea rows="10" cols="150" name="key_value">
                        </textarea>
                        <!--<input type="text" name="key_value" value="" lay-verify="required" class="layui-input">-->
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label ">配置描述</label>
                    <div class="layui-input-inline">
                        <input type="text" name="key_desc" value="" lay-verify="required" class="layui-input">
                    </div>
                </div>
               

             

                <!-- <div class="layui-form-item">
                    <label class="layui-form-label required">显示状态</label>
                    <div class="layui-input-inline">
                        <input type="radio" name="is_show" value="1" title="是" checked>
                        <input type="radio" name="is_show" value="2" title="否">
                    </div>
                </div> -->


                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
    <script src="../../common/common.js" charset="utf-8"></script>
    <!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->
    <script>
        layui.use(['form', 'table'], function () {
            var form = layui.form,
                layer = layui.layer,
                table = layui.table,
                $ = layui.$;
            /**
             * 初始化表单，要加上，不然刷新部分组件可能会不加载
             */
            form.render();
            // 当前弹出层，防止ID被覆盖
            var parentIndex = layer.index;
            var roomInfo;

            $.post(WebHost + "config/config_info", {
                "login_token": AdminLoginToken,
                "cid": parent.Id,
            }, function (data) {
                if (data.code == 201) {
                    layer.msg(data.msg, { time: 1000 }, function () {
                    });
                } else {
                    roomInfo = data.data;
                    // $("#reg_code_path_img").attr('src',roomInfo.reg_code_path);
                    form.val('MyForm', roomInfo)
                }
            }, "json");

            //监听提交
            form.on('submit(saveBtn)', function (data) {
                data.field.login_token = AdminLoginToken
                $.post(WebHost + "config/edit_config", data.field,
                    function (data, textStatus, jqXHR) {
                        if (data.code == 200) {
                            parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                        }
                        layer.msg(data.msg, { time: 1000 }, function () {

                        });

                    },
                    "json"
                );
                // var index = layer.alert(JSON.stringify(data.field), {
                //     title: '最终的提交信息'
                // }, function () {
                //     // 关闭弹出层
                //     layer.close(index);
                //     layer.close(parentIndex);
                // });
                return false;
            });

        });
    </script>

</body>

</html>
