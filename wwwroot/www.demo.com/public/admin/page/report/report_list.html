                            <!-- <div class="layui-inline">

    <script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
    <script src="../../common/common.js" charset="utf-8"></script>
    <script>
        layui.use(['form', 'table'], function () {
            var $ = layui.jquery,
                form = layui.form,
                table = layui.table;
            table.render({
                elem: '#currentTableId',
                url: WebHost + 'Report/report_list',
                where: {
                    "login_token": AdminLoginToken,
                }, //设定异步数据接口的额外参数
                method: "POST",
                toolbar: '#toolbar_add',
                defaultToolbar: ['filter', 'exports', 'print', {
                    title: '提示',
                    layEvent: 'LAYTABLE_TIPS',
                    icon: 'layui-icon-tips'
                }],
                cols: [[
                    { field: 'rid', title: 'ID' },
                    { field: 'user_nick_name', title: '举报人/ID' },
                    // { field: 'to_nick_name', title: '被举报人/ID' },
                    { field: 'type_name', title: '举报类型' },
                    { field: 'content', title: '内容' },
                    // { field: 'image', title: '图片', templet: '#image' },

                    // { field: 'result', title: '图片结果' },
                    // { field: 'status', title: '状态' , templet: '#status' },
                    // { field: 'deal_time', title: '处理时间', templet: '#deal_time' },
                    // { field: 'update_time', title: '修改时间', templet: '#update_time' },
                    { field: 'add_time', title: '创建时间', templet: '#add_time' },
                    { title: '操作', minWidth: 150, toolbar: '#currentTableBar', align: "center" }
                ]],
                limits: [10, 15, 20, 25, 50, 100],
                limit: 15,
                page: true,
                skin: 'line'
            });

            // 监听搜索操作
            form.on('submit(data-search-btn)', function (data) {
                // var result = JSON.stringify(data.field);
                // layer.alert(result, {
                //     title: '最终的搜索信息'
                // });
                data.field.admin_login_token = AdminLoginToken
                //执行搜索重载
                table.reload('currentTableId', {
                    where: data.field,
                    page: {
                        curr: 1
                    }
                }, 'json');
                return false;
            });

            /**
 * toolbar监听事件
     */

            table.on('tool(currentTableFilter)', function (obj) {
                var data = obj.data;
                if (obj.event === 'edit_info') {
                    Id = data.rid;
                    var index = layer.open({
                        title: '处理举报',
                        type: 2,
                        shade: 0.2,
                        maxmin: true,
                        shadeClose: true,
                        area: ['80%', '80%'],
                        content: '../report/report_edit.html',
                    });
                    $(window).on("resize", function () {
                        layer.full(index);
                    });
                    return false;

                } else if (obj.event === 'del') {
                    Id = data.rid;
                    admin_login_token = AdminLoginToken;
                    layer.confirm("确认要删除吗", { title: "删除确认" }, function (index) {
                        $.post(WebHost + 'Report/del_Report', { rid: Id, login_token: admin_login_token }, function (data) {
                            layer.msg(data.msg);
                            if (data.code == 200) {
                                location.reload();
                            }
                            layer.close(index);
                        }, "json");
                    });
                }
            });
        });

        function previewImg(obj) {
					var img = new Image()
					img.src = obj.src
					//var height = img.height + 50; // 原图片大小
					//var width = img.width; //原图片大小
					var imgHtml =
						"<img src='" +
						obj.src +
						"' width='500px' height='500px'/>"
					//弹出层
					layer.open({
						type: 1,
						shade: 0.8,
						offset: 'auto',
						area: [500 + 'px', 550 + 'px'], // area: [width + 'px',height+'px'] //原图显示
						shadeClose: true,
						scrollbar: false,
						title: '查看图片', //不显示标题
						content: imgHtml, //捕获的元素，注意：最好该指定的元素要存放在body最外层，否则可能被其它的相对元素所影响
						cancel: function () {
							//layer.msg('捕获就是从页面已经存在的元素上，包裹layer的结构', { time: 5000, icon: 6 });
						},
					})
		}
    </script>
<script type="text/html" id="add_time">
    {{dateFormat(d.add_time) }}
</script>

<script type="text/html" id="deal_time">

</script>
<script type="text/html" id="update_time">

</script>
    <script type="text/html" id="currentTableBar">
    <!--<a class="layui-btn layui-btn-xs data-count-edit" lay-event="edit_info">编辑</a>-->
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>


<script type="text/html" id="status">
    {{#  if(d.status == "1"){ }}
       <span style="color:red">待处理</span>
    {{# }else if(d.status=="2"){}}
        <span style="color:green">已处理</span>
    {{#  } }}
</script>

<script type="text/html" id="image">
   <img src="{{d.image}}"  height="100%" class="layui-upload-img" onclick="previewImg(this)"> 
</script>
