<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>

<body>
    <div class="layuimini-container">
        <div class="layuimini-main">

            <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
                <legend>编辑</legend>
            </fieldset>

            <form class="layui-form" action="" lay-filter="MyForm">
                <input type="hidden" name="zid" value="" class="layui-input">
                <div class="layui-form-item">
                    <label class="layui-form-label ">用户id</label>
                    <div class="layui-input-inline">
                        <input type="text" name="uid" readonly class="layui-input layui-disabled" readonly>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label ">用户名</label>
                    <div class="layui-input-inline">
                        <input type="text" name="user_name" readonly class="layui-input layui-disabled" readonly>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label ">昵称</label>
                    <div class="layui-input-inline">
                        <input type="text" name="nick_name" readonly class="layui-input layui-disabled" readonly>
                    </div>
                </div>


                <div class="layui-form-item">
                    <label class="layui-form-label ">封面图(多图)</label>
                    <div class="layui-input-block">
                        <div id="image_show">
                        </div>
                        <!--<div class="layui-upload" style="margin-top: 10px;" style="display: none;">-->
                        <!--    <button type="button" class="layui-btn" id="test1">上传图片</button>-->
                        <!--</div>-->
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label ">内容</label>
                    <div class="layui-input-block" style="width: 500px;">
                        <textarea placeholder="" class="layui-textarea" id="content" name="content" readonly></textarea>
                        <tex>
                    </div>
                </div>


                <div class="layui-form-item">
                    <label class="layui-form-label required">审核状态</label>
                    <div class="layui-input-inline">
                        <input type="radio" name="show_status" value="1" title="待审核">
                        <input type="radio" name="show_status" value="2" title="通过">
                        <input type="radio" name="show_status" value="3" title="拒绝">
                    </div>
                </div>


                <div class="layui-form-item">
                    <label class="layui-form-label required">发布时间</label>
                    <div class="layui-input-inline">
                        <input type="text" name="add_time" readonly value="" class="layui-input layui-disabled">
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
    <script src="../../common/common.js" charset="utf-8"></script>
    <!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->

    <script>
        layui.use(['form', 'table'], function () {
            var form = layui.form,
                layer = layui.layer,
                table = layui.table,
                $ = layui.$;

            /**
             * 初始化表单，要加上，不然刷新部分组件可能会不加载
             */
            form.render();
            // 当前弹出层，防止ID被覆盖
            var parentIndex = layer.index;
            var userInfo;

            //监听提交
            form.on('submit(saveBtn)', function (data) {
                data.field.login_token = AdminLoginToken
                $.post(WebHost + "zone/edit_user_zone", data.field,
                    function (data, textStatus, jqXHR) {
                        if (data.code == 200) {
                            parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                        }
                        layer.msg(data.msg, { time: 1000 }, function () {

                        });

                    },
                    "json"
                );

                // var index = layer.alert(JSON.stringify(data.field), {
                //     title: '最终的提交信息'
                // }, function () {
                //     // 关闭弹出层
                //     layer.close(index);
                //     layer.close(parentIndex);
                // });
                return false;

            });


            $.post(WebHost + "zone/get_zone_info", {
                "login_token": AdminLoginToken,
                "zid": parent.Id,
            }, function (data) {
                if (data.code == 201) {
                    layer.msg(data.msg, { time: 1000 }, function () {
                    });
                } else {
                    Info = data.data;
                    Info.add_time = dateFormat(Info.add_time)

                    list = Info.image_list.split(',');
                    if (list != null || list.size() > 0) {
                        for (var c in list) {
                            image_html = '<img src="' + list[c] + '" style="height:100px;margin:0 3px;">';
                            $('#image_show').append(image_html); //图片链接（base64）
                        }
                    };
                    // $("#sound").attr('src', Info.http_sound);

                    form.val('MyForm', Info)
                    form.render();
                }
            }, "json");


            //  $("#hid").find("option[value='{$param.hid}']").prop("selected",true);
            //   form.render();

        });
    </script>
</body>

</html>
