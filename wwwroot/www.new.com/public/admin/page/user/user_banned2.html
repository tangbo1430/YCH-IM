<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>
<body>
<div class="layuimini-container">
    <div class="layuimini-main">
        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
            <legend>封禁id</legend>
        </fieldset>
        <form class="layui-form" action="" lay-filter="MyForm">
            <div class="layui-form-item">
                <label class="layui-form-label required">登录状态</label>
                <div class="layui-input-inline">
                    <input type="radio" name="type" value="1" title="封禁">
                    <input type="radio" name="type" value="2" title="解封">
                </div>
            </div>
          

            <div class="layui-form-item">
                <label class="layui-form-label ">上传文件</label>
                <div class="layui-input-inline">
                    <button type="button" class="layui-btn layui-btn-primary" id="upload">选择文件</button>
                    <input type="hidden" name="filepath" id="file_url" value="">
                </div>
                <div class="layui-form-mid layui-word-aux" id="uploadText">请选择文件</div>
            </div>
           <div class="layui-form-item">
            <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>
            </div>
            </div>
        </form>
    </div>
</div>

<script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<script src="../../common/common.js" charset="utf-8"></script>
<!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->
<script>
    layui.use(['form', 'table', 'upload'], function () {
        var form = layui.form,
            layer = layui.layer,
            table = layui.table,
            upload = layui.upload;
               var group_id = parent.GroupId
            $ = layui.$;

        /**
         * 初始化表单，要加上，不然刷新部分组件可能会不加载
         */
        form.render();
        // 当前弹出层，防止ID被覆盖
        var parentIndex = layer.index;
        var roomInfo;

        // 文件上传功能
        upload.render({
            elem: '#upload',
            url: WebHost + 'upload/file_upload', // 上传接口
            accept: 'file', // 允许上传的文件类型
            data: {
                login_token: AdminLoginToken
            },
            done: function(res){
                if(res.code == 200){
                    $('#file_url').val(res.data.http_image_path);
                    $('#uploadText').html('文件上传成功！');
                   
                    layer.msg('文件上传成功');
                } else {
                    layer.msg('上传失败：' + res.msg);
                }
            },
            error: function(){
                layer.msg('上传异常');
            }
        });

        //监听提交
        form.on('submit(saveBtn)', function (data) {
            data.field.login_token=AdminLoginToken
            $.post(WebHost + "user/add_banned_user_file", data.field,
                function (data, textStatus, jqXHR) {
                    if(data.code==200){
                        parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                    }
                    layer.msg(data.msg,{time:1000},function(){

                    });
                    
                },
                "json"
            );
          
            
            return false;

        });
    });
</script>
</body>
</html>
