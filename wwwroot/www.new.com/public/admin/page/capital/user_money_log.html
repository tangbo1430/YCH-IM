<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>

<body>
    <div class="layuimini-container">
        <div class="layuimini-main">

            <fieldset class="table-search-fieldset">
                <legend>搜索信息</legend>
                <div style="margin: 10px 10px 10px 10px">
                    <form class="layui-form layui-form-pane" action="">
                        <div class="layui-form-item">
                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="uid" autocomplete="off" class="layui-input"
                                        placeholder="用户uid">
                                </div>
                            </div>
                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="nick_name" autocomplete="off" class="layui-input"
                                        placeholder="用户昵称">
                                </div>
                            </div>

                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="from_uid" autocomplete="off" class="layui-input"
                                        placeholder="来自uid">
                                </div>
                            </div>

                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <input type="text" name="change_value" autocomplete="off" class="layui-input"
                                        placeholder="改变数值">
                                </div>
                            </div>

                            <div class="layui-inline">
                                <div class="layui-input-inline">
                                    <select name="change_type" lay-filter="aihao">
                                        <option value="">改变类型</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <button type="submit" class="layui-btn layui-btn-primary" lay-submit
                                    lay-filter="data-search-btn"><i class="layui-icon"></i> 搜 索</button>
                            </div>
                        </div>
                    </form>
                </div>
            </fieldset>
            <table class="layui-hide" id="currentTableId" lay-filter="currentTableFilter" style="align: center;">
            </table>
        </div>
    </div>
    <script src="../../lib/layui-v2.5.7/layui.js" charset="utf-8"></script>
    <script src="../../common/common.js" charset="utf-8"></script>
    <script>
        layui.use(['form', 'table'], function () {
            var $ = layui.jquery,
                form = layui.form,
                table = layui.table;

            table.render({
                elem: '#currentTableId',
                url: WebHost + 'capital/user_money_log',
                where: {
                    "login_token": AdminLoginToken,
                }, //设定异步数据接口的额外参数
                method: "POST",
                toolbar: '#toolbar',
                defaultToolbar: ['filter', 'exports', 'print', {
                    title: '提示',
                    layEvent: 'LAYTABLE_TIPS',
                    icon: 'layui-icon-tips'
                }],
                totalRow: true,
                cols: [[
                    { field: 'log_id', title: 'ID', totalRowText: '合计' },
                    { field: 'user_nick_name', title: '用户ID-昵称' },
                    { field: 'change_type', title: '改变类型' },
                    { field: 'change_value', title: '改变数值', totalRow: true, },
                    { field: 'after_money', title: '最终余额' },
                    { field: 'from_uid', title: '来自uid' },
                    { field: 'remarks', title: '备注' },
                    { field: 'update_time', title: '修改时间', templet: '#update_time' },
                    { field: 'add_time', title: '生成时间', templet: '#add_time' },
                    // {title: '操作', minWidth: 150, toolbar: '#currentTableBar', align: "center"}
                ]],
                limits: [10, 15, 20, 25, 50, 100],
                limit: 15,
                page: true,
                skin: 'line'
            });

            $.ajax({
                type: "POST",
                url: WebHost + "capital/get_change_type",
                data: { "login_token": AdminLoginToken },
                dataType: "json",
                async: false,
                success: function (data) {
                    var list = data.data;
                    if (list != null || list.size() > 0) {
                        for (var c in list) {
                            var option = document.createElement("option");
                            option.setAttribute("value", c);
                            option.innerText = list[c];
                            $("select[name='change_type']").append(option)
                        }
                    };
                    form.render();
                }
            });

            // 监听搜索操作
            form.on('submit(data-search-btn)', function (data) {
                // var result = JSON.stringify(data.field);
                // layer.alert(result, {
                //     title: '最终的搜索信息'
                // });
                data.field.admin_login_token = AdminLoginToken
                //执行搜索重载
                table.reload('currentTableId', {
                    where: data.field,
                    page: {
                        curr: 1
                    }
                }, 'json');

                return false;
            });


            table.on('tool(currentTableFilter)', function (obj) {
                var data = obj.data;
            });
        });
    </script>
    <script type="text/html" id="update_time">
    {{dateFormat(d.update_time) }}
</script>

    <script type="text/html" id="add_time">
    {{dateFormat(d.add_time) }}
</script>
</body>

</html>
