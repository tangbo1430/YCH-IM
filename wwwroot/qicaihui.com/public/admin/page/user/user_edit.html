<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>
<body>
<div class="layuimini-container">
    <div class="layuimini-main">

        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
            <legend>用户编辑</legend>
        </fieldset>

        <form class="layui-form" action="" lay-filter="MyForm">
            <input type="hidden" name="uid" value=""  class="layui-input">
            <div class="layui-form-item">
                <label class="layui-form-label ">用户名</label>
                <div class="layui-input-inline">
                    <input type="text" name="user_name" readonly  class="layui-input layui-disabled">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label ">用户昵称</label>
                <div class="layui-input-inline">
                    <input type="text" name="nick_name"   value="" class="layui-input">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label ">用户头像</label>
                <div class="layui-input-inline">
                    <input type="text" name="head_pic" value=""  class="layui-input layui-hide">
                    <img src="" id="head_pic_img" height="100px" width="100px">
                </div>
            </div>
           
           
            <div class="layui-form-item">
                <label class="layui-form-label required">性别</label>
                <div class="layui-input-block">
                    <input type="radio" name="sex" value="1" title="男">
                    <input type="radio" name="sex" value="2" title="女">
                </div>
            </div>
           
            <div class="layui-form-item">
                <label class="layui-form-label required">登录状态</label>
                <div class="layui-input-inline">
                    <input type="radio" name="login_status" value="1" title="正常">
                    <input type="radio" name="login_status" value="2" title="禁止">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label required">登录IP</label>
                <div class="layui-input-inline">
                    <input type="text"  name="login_ip" readonly  value="" class="layui-input layui-disabled">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label required">最后登录时间</label>
                <div class="layui-input-inline">
                    <input type="text"  name="last_login_time"  readonly value="" class="layui-input layui-disabled">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label required">注册IP</label>
                <div class="layui-input-inline">
                    <input type="text"  name="reg_ip" readonly   value="" class="layui-input layui-disabled" >
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label required">注册时间</label>
                <div class="layui-input-inline">
                    <input type="text"  name="add_time" readonly  value="" class="layui-input layui-disabled">
                </div>
            </div>
            
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<script src="../../common/common.js" charset="utf-8"></script>
<!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->

<script>
    layui.use(['form', 'table'], function () {
        var form = layui.form,
            layer = layui.layer,
            table = layui.table,
            $ = layui.$;

        /**
         * 初始化表单，要加上，不然刷新部分组件可能会不加载
         */
        form.render();
        // 当前弹出层，防止ID被覆盖
        var parentIndex = layer.index;
        var userInfo;

        //监听提交
        form.on('submit(saveBtn)', function (data) {
            data.field.login_token=AdminLoginToken
            $.post(WebHost + "user/edit_user_info", data.field,
                function (data, textStatus, jqXHR) {
                    if(data.code==200){
                        parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                    }
                    layer.msg(data.msg,{time:1000},function(){

                    });
                    
                },
                "json"
            );
          
            // var index = layer.alert(JSON.stringify(data.field), {
            //     title: '最终的提交信息'
            // }, function () {
            //     // 关闭弹出层
            //     layer.close(index);
            //     layer.close(parentIndex);
            // });
            return false;

        });


        $.post(WebHost + "user/get_user_info", {
            "login_token": AdminLoginToken,
             "uid":parent.Id,
        }, function (data) {
            if(data.code==201){
                layer.msg(data.msg,{time:1000},function(){
                });
            }else{
                userInfo=data.data;
                userInfo.add_time = dateFormat(userInfo.add_time)
                userInfo.last_login_time = dateFormat(userInfo.last_login_time)
                $("#head_pic_img").attr('src',userInfo.head_pic);
                
                form.val('MyForm',userInfo)
            }
        }, "json");

        
//  $("#hid").find("option[value='{$param.hid}']").prop("selected",true);
//   form.render();

    });
</script>
</body>
</html>
