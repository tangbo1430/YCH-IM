<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>

<body>
    <div class="layuimini-container">
        <div class="layuimini-main">
            <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
                <legend>实名审核</legend>
            </fieldset>
            <form class="layui-form" action="" lay-filter="MyForm" autocomplete="off">
                <input type="hidden" name="nid" value="" class="layui-input">
                <div class="layui-form-item">
                    <label class="layui-form-label ">用户id</label>
                    <div class="layui-input-inline">
                        <input type="text" name="uid" value="" lay-verify="required" class="layui-input" readonly>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label ">真实姓名</label>
                    <div class="layui-input-inline">
                        <input type="text" name="real_name" value="" lay-verify="required" class="layui-input" readonly>
                    </div>
                </div> 
                <div class="layui-form-item">
                    <label class="layui-form-label ">身份证号</label>
                    <div class="layui-input-inline">
                        <input type="text" name="card_id" value="" lay-verify="required" class="layui-input" readonly>
                    </div>
                </div>
                
                <div class="layui-form-item">
                    <label class="layui-form-label ">人像照片</label>
                    <div class="layui-input-inline">
                        <img src="../../images/bg.jpg" id="identity1" height="100px" width="100px">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label ">国徽照片</label>
                    <div class="layui-input-inline">
                        <img src="../../images/bg.jpg" id="identity2" height="100px" width="100px">
                    </div>
                </div>
                
               <div class="layui-form-item">
                    <label class="layui-form-label required">状态</label>
                    <div class="layui-input-inline">
                        <select name="status" lay-filter="aihao">
                            <option value="1">待审核</option>
                            <option value="2">驳回</option>
                            <option value="3">通过</option>
                        </select>
                    </div>
                </div>
                
                <div class="layui-form-item">
                    <label class="layui-form-label">备注</label>
                    <div class="layui-input-block">
                        <textarea placeholder="备注" value="" class="layui-textarea" name="remarke"></textarea>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
    <script src="../../common/common.js" charset="utf-8"></script>
    <script src="../../extend/svgaplayerweb@2.3.1/svga.min.js" charset="utf-8"></script>
    <!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->

    <script>
        layui.use(['form', 'table'], function () {
            var form = layui.form,
                layer = layui.layer,
                table = layui.table,
                $ = layui.$;
            /**
             * 初始化表单，要加上，不然刷新部分组件可能会不加载
             */
            form.render();
            // 当前弹出层，防止ID被覆盖
            var parentIndex = layer.index;
            var roomInfo;
            $.post(WebHost + "user/get_user_real_name", {
                "login_token": AdminLoginToken,
                "nid": parent.Id,
            }, function (data) {
                if (data.code == 201) {
                    layer.msg(data.msg, { time: 1000 }, function () {
                    });
                } else {
                    roomInfo = data.data;

                    $("#identity1").attr('src', roomInfo.identity1);
                    $("#identity2").attr('src', roomInfo.identity2);
                    if (roomInfo.show_status == 2) {
                        $("#play_image_div").hide();
                    }
                    
                    // $("#reg_code_path_img").attr('src',roomInfo.reg_code_path);
                    form.val('MyForm', roomInfo)
                }
            }, "json");

            //监听提交
            form.on('submit(saveBtn)', function (data) {
                data.field.login_token = AdminLoginToken
                $.post(WebHost + "user/edit_user_real_name", data.field,
                    function (data, textStatus, jqXHR) {
                        if (data.code == 200) {
                            parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                        }
                        layer.msg(data.msg, { time: 1000 }, function () {

                        });

                    },
                    "json"
                );
                // var index = layer.alert(JSON.stringify(data.field), {
                //     title: '最终的提交信息'
                // }, function () {
                //     // 关闭弹出层
                //     layer.close(index);
                //     layer.close(parentIndex);
                // });
                return false;
            });
        });
    </script>
</body>
</html>
