<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../css/public.css" media="all">
</head>

<body>
    <div class="layuimini-container">
        <div class="layuimini-main">
            <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
                <legend>单页添加</legend>
            </fieldset>
            <form class="layui-form" action="" lay-filter="MyForm">

                <div class="layui-form-item">
                    <label class="layui-form-label ">标题</label>
                    <div class="layui-input-inline">
                        <input type="text" name="title" value="" lay-verify="required" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label ">跳转URL</label>
                    <div class="layui-input-inline">
                        <input type="text" name="url" value="" lay-verify="required" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label for="agent_name" class="layui-form-label">
                        <span class="x-red">*</span>文章详情</label>
                    <div class="layui-input-inline" style="width:400px;">
                        <textarea id="desc" name="content" style="height: 600px;z-index: 10;"></textarea>
                    </div>
                </div>


                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
    <script src="../../common/common.js" charset="utf-8"></script>
    <script type="text/javascript" charset="utf-8" src="../../extend/umeditor/ueditor.config.js"></script>
    <script type="text/javascript" charset="utf-8" src="../../extend/umeditor/ueditor.all.js"> </script>
    <!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->

    <script>
        layui.use(['form', 'table', 'layer', 'upload'], function () {
            var form = layui.form,
                layer = layui.layer,
                table = layui.table,
                $ = layui.$;
            /**
             * 初始化表单，要加上，不然刷新部分组件可能会不加载
             */
            form.render();
            // 当前弹出层，防止ID被覆盖
            var parentIndex = layer.index;
            var roomInfo;

            //监听提交
            form.on('submit(saveBtn)', function (data) {
                data.field.login_token = AdminLoginToken
                $.post(WebHost + "Website/add_page", data.field,
                    function (data, textStatus, jqXHR) {
                        if (data.code == 200) {
                            parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                        }
                        layer.msg(data.msg, { time: 1000 }, function () {

                        });

                    },
                    "json"
                );
                // var index = layer.alert(JSON.stringify(data.field), {
                //     title: '最终的提交信息'
                // }, function () {
                //     // 关闭弹出层
                //     layer.close(index);
                //     layer.close(parentIndex);
                // });
                return false;
            });

        });
    </script>

    <script>
        // var url = '{:url("Ueditor/index")}';//WebHost + "Website/add_user_level"
        var url = WebHost + "Ueditor/index";
        var ue = UE.getEditor('desc', {
            serverUrl: url,
            zIndex: 100
        });
        layui.use('upload', function () {
            var $ = layui.jquery
                , upload = layui.upload;

            //普通图片上传
            var uploadInst = upload.render({
                elem: '#test1'
                , url: WebHost + "Upload/file_upload"//改成您自己的上传接口
                , data: { "login_token": AdminLoginToken, file_category: 'user_level' }
                , before: function (obj) {
                    //预读本地文件示例，不支持ie8
                    obj.preview(function (index, file, result) {
                        $('#room_cover_img').attr('src', result); //图片链接（base64）
                    });
                }
                , done: function (res) {
                    //如果上传失败
                    if (res.code == 201) {
                        return layer.msg('上传失败');
                    }
                    //上传成功
                    $('#image').val(res.data.image_path); //图片链接（base64）
                }
                , error: function () {
                    //演示失败状态，并实现重传
                    var demoText = $('#demoText');
                    demoText.html('<span style="color: #FF5722;">上传失败</span> <a class="layui-btn layui-btn-xs demo-reload">重试</a>');
                    demoText.find('.demo-reload').on('click', function () {
                        uploadInst.upload();
                    });
                }
            });

        });
    </script>
</body>

</html>
