<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<body>
<div class="layuimini-container">
    <div class="layuimini-main">
        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
            <legend>处理举报</legend>
        </fieldset>
        <form class="layui-form" action="" lay-filter="MyForm">
            <input type="hidden" name="rid" value=""  class="layui-input layui-disabled">
            <div class="layui-form-item">
                <label class="layui-form-label ">举报人</label>
                <div class="layui-input-inline">
                    <input type="text" name="uid_name" readonly  class="layui-input layui-disabled">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label ">被举报人</label>
                <div class="layui-input-inline">
                    <input type="text" name="to_uid_name" readonly class="layui-input layui-disabled">
                </div>
            </div>

            <!--<div class="layui-form-item">-->
            <!--    <label class="layui-form-label ">图片</label>-->
            <!--    <div class="layui-input-inline">-->
            <!--        <input type="text" name="image" value="" id="image_url1" class="layui-input layui-hide">-->
            <!--        <img src="" id="image" height="100px" width="100px">-->
            <!--    </div>-->
            <!--</div>-->

            <div class="layui-form-item">
                <label class="layui-form-label ">举报内容</label>
                <div class="layui-input-inline">
                    <input type="text" name="content" readonly class="layui-input layui-disabled">
                </div>
            </div>

            <!--<div class="layui-form-item">-->
            <!--    <label class="layui-form-label required">状态</label>-->
            <!--    <div class="layui-input-inline">-->
            <!--        <input type="radio" name="status" value="1" title="待处理">-->
            <!--        <input type="radio" name="status" value="2" title="已处理">-->
            <!--    </div>-->
            <!--</div>-->

            <div class="layui-form-item">
                <label class="layui-form-label required">举报时间</label>
                <div class="layui-input-inline">
                    <input type="text"  name="add_time"  value="" readonly class="layui-input layui-disabled">
                </div>
            </div>
            
            <!--<div class="layui-form-item">-->
            <!--    <div class="layui-input-block">-->
            <!--        <button class="layui-btn" lay-submit lay-filter="saveBtn">确认保存</button>-->
            <!--    </div>-->
            <!--</div>-->
        </form>
    </div>
</div>

<script src="../../lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<script src="../../common/common.js" charset="utf-8"></script>
<!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->

<script>
    layui.use(['form', 'table'], function () {
        var form = layui.form,
            layer = layui.layer,
            table = layui.table,
            $ = layui.$;

        /**
         * 初始化表单，要加上，不然刷新部分组件可能会不加载
         */
        form.render();
        // 当前弹出层，防止ID被覆盖
        var parentIndex = layer.index;
        var roomInfo;

        //监听提交
        form.on('submit(saveBtn)', function (data) {
            data.field.login_token=AdminLoginToken
            $.post(WebHost + "report/edit_user_info", data.field,
                function (data, textStatus, jqXHR) {
                    if(data.code==200){
                        parent.layui.table.reload('currentTableId', {}, 'json');//刷新父级页面
                    }
                    layer.msg(data.msg,{time:1000},function(){

                    });
                    
                },
                "json"
            );
          
            // var index = layer.alert(JSON.stringify(data.field), {
            //     title: '最终的提交信息'
            // }, function () {
            //     // 关闭弹出层
            //     layer.close(index);
            //     layer.close(parentIndex);
            // });
            return false;

        });

        $.post(WebHost + "report/report_info", {
            "login_token": AdminLoginToken,
             "rid":parent.Id,
        }, function (data) {
            if(data.code==201){
                layer.msg(data.msg,{time:1000},function(){
                });
            }else{
                roomInfo=data.data;
                roomInfo.add_time = dateFormat(roomInfo.add_time)
                 $("#image").attr('src', roomInfo.image);
                form.val('MyForm',roomInfo)
            }
        }, "json");
    });
</script>
</body>
</html>
